name: Firefly cron (ingest + grade)

# Free scheduled trigger — bypasses Vercel Hobby's daily-only cron limit.
on:
  schedule:
    - cron: '*/30 * * * *' # every 30 minutes (UTC)
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: firefly-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Ingest feeds
        run: |
          curl --fail --silent --show-error --max-time 120 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.SITE_URL }}/api/cron/ingest"

      - name: Grade pending articles (several batches)
        run: |
          # Each call grades one batch of 8 (well under Vercel's 60s cap).
          # Loop to drain more per cron cycle — the runner has no such limit.
          for i in 1 2 3 4 5 6 7 8; do
            echo "grade pass $i";
            curl --fail --silent --show-error --max-time 90 \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.SITE_URL }}/api/cron/grade" || exit 1;
          done
