  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

erbs.length];\n        title = v.charAt(0).toUpperCase() + v.slice(1) + ' what ' + t + ' means for the next model generation';\n        source = sources[(i * 3) % sources.length];\n      }\n      items.push({ id: i, title, source, minutesAgo: 4 + ((i * 37) % 700), rank: i + 1 });\n    }\n    return items;\n  }\n\n  // ---------- three.js ----------\n  componentDidMount() {\n    this.disposed = false;\n    const boot = () => {\n      if (this.disposed) return;\n      if (!window.THREE || !this.mountRef.current) { setTimeout(boot, 60); return; }\n      this.initScene();\n    };\n    boot();\n    this.onKeyDown = (e) => {\n      if (e.key === '/' && !this.state.cmdOpen && document.activeElement.tagName !== 'INPUT') {\n        e.preventDefault();\n        this.setState({ cmdOpen: true, cmdText: '', cmdFeedback: '' }, () => {\n          setTimeout(() => { if (this.cmdRef.current) this.cmdRef.current.focus(); }, 30);\n        });\n      } else if (e.key === 'Escape') {\n        this.setState({ cmdOpen: false, card: null });\n      }\n    };\n    window.addEventListener('keydown', this.onKeyDown);\n  }\n\n  componentWillUnmount() {\n    this.disposed = true;\n    window.removeEventListener('keydown', this.onKeyDown);\n    if (this.raf) cancelAnimationFrame(this.raf);\n    if (this.renderer) { this.renderer.dispose(); if (this.renderer.domElement.parentNode) this.renderer.domElement.parentNode.removeChild(this.renderer.domElement); }\n    if (this.onResize) window.removeEventListener('resize', this.onResize);\n  }\n\n  glowTexture() {\n    const c = document.createElement('canvas');\n    c.width = c.height = 128;\n    const ctx = c.getContext('2d');\n    const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);\n    g.addColorStop(0, 'rgba(255,255,255,1)');\n    g.addColorStop(0.18, 'rgba(255,255,255,0.9)');\n    g.addColorStop(0.45, 'rgba(255,255,255,0.25)');\n    g.addColorStop(1, 'rgba(255,255,255,0)');\n    ctx.fillStyle = g;\n    ctx.fillRect(0, 0, 128, 128);\n    return new THREE.CanvasTexture(c);\n  }\n\n  initScene() {\n    const THREE = window.THREE;\n    const mount = this.mountRef.current;\n    const count = Math.max(20, Math.min(500, this.props.fireflyCount ?? 160));\n    this.news = this.makeNews(count);\n\n    const scene = new THREE.Scene();\n    const camera = new THREE.PerspectiveCamera(55, mount.clientWidth / mount.clientHeight, 0.1, 200);\n    camera.position.set(0, 0, 26);\n    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n    renderer.setSize(mount.clientWidth, mount.clientHeight);\n    mount.appendChild(renderer.domElement);\n    this.scene = scene; this.camera = camera; this.renderer = renderer;\n\n    const tex = this.glowTexture();\n    const highC = new THREE.Color(this.props.highColor ?? '#ff4433');\n    const lowC = new THREE.Color(this.props.lowColor ?? '#ffd23f');\n\n    // rank 1 (highest) => t=1 red, big, close; last rank => t=0 yellow, small, far\n    this.flies = this.news.map((item) => {\n      const t = 1 - (item.rank - 1) / (count - 1);\n      const color = lowC.clone().lerp(highC, Math.pow(t, 1.4));\n      const mat = new THREE.SpriteMaterial({ map: tex, color, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });\n      const sp = new THREE.Sprite(mat);\n      // cloud distribution: gaussian-ish ball, high rank nearer camera\n      const r = 8 + Math.random() * 8;\n      const th = Math.random() * Math.PI * 2;\n      const ph = Math.acos(2 * Math.random() - 1);\n      sp.position.set(\n        r * Math.sin(ph) * Math.cos(th) * 1.5,\n        r * Math.sin(ph) * Math.sin(th) * 0.85,\n        (r * Math.cos(ph)) * 0.5 + t * 9 - 3\n      );\n      const size = 0.28 + t * 0.85;\n      sp.scale.setScalar(size);\n      sp.userData = {\n        item, t, size,\n        base: sp.position.clone(),\n        phase: Math.random() * Math.PI * 2,\n        pulse: 0.5 + Math.random() * 1.4,          // pulse frequency\n        wf: [0.13 + Math.random() * 0.2, 0.11 + Math.random() * 0.18, 0.09 + Math.random() * 0.15],\n        wp: [Math.random() * 9, Math.random() * 9, Math.random() * 9],\n        baseOpacity: 0.55 + t * 0.45,\n        dim: 1\n      };\n      scene.add(sp);\n      return sp;\n    });\n\n    this.raycaster = new THREE.Raycaster();\n    this.pointer = new THREE.Vector2(-10, -10);\n    this.mouseNorm = { x: 0, y: 0 };\n    this.hovered = null;\n\n    renderer.domElement.addEventListener('pointermove', (e) => {\n      const rect = renderer.domElement.getBoundingClientRect();\n      this.pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;\n      this.pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;\n      this.mouseNorm.x = this.pointer.x; this.mouseNorm.y = this.pointer.y;\n    });\n    renderer.domElement.addEventListener('click', () => {\n      if (this.hovered) {\n        const d = this.hovered.userData;\n        const p = this.toScreen(this.hovered.position);\n        const w = mount.clientWidth, h = mount.clientHeight;\n        const x = Math.min(Math.max(p.x + 18, 12), w - 320);\n        const y = Math.min(Math.max(p.y - 20, 12), h - 190);\n        const hex = '#' + this.hovered.material.color.getHexString();\n        this.setState({\n          card: {\n            id: d.item.id, title: d.item.title, source: d.item.source, rank: d.item.rank,\n            time: d.item.minutesAgo < 60 ? d.item.minutesAgo + 'm ago' : Math.round(d.item.minutesAgo / 60) + 'h ago',\n            x, y, color: hex, glow: hex + '99'\n          },\n          hover: null\n        });\n      } else if (this.state.card) {\n        this.setState({ card: null });\n      }\n    });\n\n    this.onResize = () => {\n      camera.aspect = mount.clientWidth / mount.clientHeight;\n      camera.updateProjectionMatrix();\n      renderer.setSize(mount.clientWidth, mount.clientHeight);\n    };\n    window.addEventListener('resize', this.onResize);\n\n    this.clock = new THREE.Clock();\n    const loop = () => {\n      if (this.disposed) return;\n      this.raf = requestAnimationFrame(loop);\n      this.tick();\n    };\n    loop();\n  }\n\n  toScreen(v3) {\n    const v = v3.clone().project(this.camera);\n    const mount = this.mountRef.current;\n    return { x: (v.x + 1) / 2 * mount.clientWidth, y: (1 - v.y) / 2 * mount.clientHeight };\n  }\n\n  motionFactor() {\n    return this.state.motion === 'slow' ? 0.35 : this.state.motion === 'more' ? 2.4 : 1;\n  }\n\n  tick() {\n    const t = this.clock.getElapsedTime();\n    const m = this.motionFactor();\n    const filter = this.state.filter.toLowerCase();\n\n    // hover raycast\n    this.raycaster.setFromCamera(this.pointer, this.camera);\n    const hits = this.raycaster.intersectObjects(this.flies, false);\n    const newHover = hits.length ? hits[0].object : null;\n    if (newHover !== this.hovered) {\n      this.hovered = newHover;\n      this.renderer.domElement.style.cursor = newHover ? 'pointer' : 'default';\n      if (newHover) {\n        const p = this.toScreen(newHover.position);\n        this.setState({ hover: { title: newHover.userData.item.title, x: p.x, y: p.y } });\n      } else {\n        this.setState({ hover: null });\n      }\n    } else if (this.hovered && this.state.hover) {\n      const p = this.toScreen(this.hovered.position);\n      if (Math.abs(p.x - this.state.hover.x) > 1 || Math.abs(p.y - this.state.hover.y) > 1) {\n        this.setState({ hover: { title: this.hovered.userData.item.title, x: p.x, y: p.y } });\n      }\n    }\n\n    for (const sp of this.flies) {\n      const d = sp.userData;\n      const isHover = sp === this.hovered;\n      const matched = !filter || d.item.title.toLowerCase().includes(filter) || d.item.source.toLowerCase().includes(filter);\n      const dimTarget = matched ? 1 : 0.05;\n      d.dim += (dimTarget - d.dim) * 0.08;\n\n      if (!isHover) {\n        // tiny local wander — sums of slow sinusoids, no long travel\n        const amp = 0.55 * m;\n        sp.position.x = d.base.x + Math.sin(t * d.wf[0] * m + d.wp[0]) * amp + Math.sin(t * d.wf[1] * 2.7 * m + d.wp[2]) * amp * 0.3;\n        sp.position.y = d.base.y + Math.sin(t * d.wf[1] * m + d.wp[1]) * amp * 0.8 + Math.cos(t * d.wf[2] * 3.1 * m + d.wp[0]) * amp * 0.25;\n        sp.position.z = d.base.z + Math.sin(t * d.wf[2] * m + d.wp[2]) * amp * 0.5;\n      }\n\n      // firefly pulse: asymmetric — quick flash, slow fade\n      const s = Math.sin(t * d.pulse * (0.6 + 0.4 * m) + d.phase);\n      const pulse = 0.22 + 0.78 * Math.pow(Math.max(0, s), 2.2) + 0.1 * Math.max(0, Math.sin(t * d.pulse * 3.7 + d.phase * 2)) * 0.5;\n      const hoverBoost = isHover ? 1.6 : 1;\n      sp.material.opacity = Math.min(1, d.baseOpacity * pulse * hoverBoost) * d.dim;\n      sp.scale.setScalar(d.size * (0.85 + 0.3 * pulse) * (isHover ? 1.7 : 1));\n    }\n\n    // camera: slow ambient drift + mouse parallax\n    const px = this.mouseNorm.x * 2.2, py = this.mouseNorm.y * 1.4;\n    this.camera.position.x += ((Math.sin(t * 0.05) * 1.5 + px) - this.camera.position.x) * 0.02;\n    this.camera.position.y += ((Math.cos(t * 0.04) * 1.0 + py) - this.camera.position.y) * 0.02;\n    this.camera.lookAt(0, 0, 2);\n    this.renderer.render(this.scene, this.camera);\n  }\n\n  // ---------- commands ----------\n  runCommand(raw) {\n    const txt = raw.trim().replace(/^\\//, '');\n    const [cmd, ...rest] = txt.split(/\\s+/);\n    const arg = rest.join(' ');\n    if (cmd === 'search') {\n      if (!arg) { this.setState({ cmdFeedback: 'usage: /search <term> — /clear to reset' }); return; }\n      this.setState({ filter: arg, cmdOpen: false, cmdText: '' });\n    } else if (cmd === 'motion') {\n      const map = { slow: 'slow', calm: 'slow', more: 'more', normal: 'normal', reset: 'normal' };\n      if (map[arg]) this.setState({ motion: map[arg], cmdOpen: false, cmdText: '' });\n      else this.setState({ cmdFeedback: 'usage: /motion slow | normal | more' });\n    } else if (cmd === 'clear') {\n      this.setState({ filter: '', motion: 'normal', cmdOpen: false, cmdText: '', card: null });\n    } else {\n      this.setState({ cmdFeedback: 'unknown command — try: search, motion, clear' });\n    }\n  }\n\n  renderVals() {\n    const c = this.state.card, h = this.state.hover;\n    const parts = [];\n    if (this.state.filter) parts.push('FILTER: ' + this.state.filter.toUpperCase());\n    if (this.state.motion !== 'normal') parts.push('MOTION: ' + this.state.motion.toUpperCase());\n    const statusLine = parts.length ? parts.join('   ·   ') + '   ·   / TO CHANGE' : 'PRESS / FOR COMMANDS';\n    return {\n      mountRef: this.mountRef,\n      cmdRef: this.cmdRef,\n      hoverVisible: !!h && !c, hoverTitle: h ? h.title : '', hoverX: h ? h.x : 0, hoverY: h ? h.y : 0,\n      cardVisible: !!c,\n      cardTitle: c ? c.title : '', cardSource: c ? c.source : '', cardTime: c ? c.time : '',\n      cardRank: c ? c.rank : 0, cardX: c ? c.x : 0, cardY: c ? c.y : 0,\n      cardColor: c ? c.color : '#ffd23f', cardGlow: c ? c.glow : 'transparent',\n      closeCard: () => this.setState({ card: null }),\n      cmdOpen: this.state.cmdOpen,\n      cmdText: this.state.cmdText,\n      cmdFeedback: this.state.cmdFeedback,\n      onCmdChange: (e) => this.setState({ cmdText: e.target.value, cmdFeedback: '' }),\n      onCmdKey: (e) => {\n        if (e.key === 'Enter') this.runCommand(this.state.cmdText);\n        e.stopPropagation();\n      },\n      statusLine\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
